# Pre-commit Configuration
# Production-ready automated checks for Rust projects
# Aligned with Agentic Native principles

# ============================================
# Stage: pre-commit (Run before creating a commit)
# Target: <5s execution time
# ============================================
repos:
  # General file checks (fast)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-vcs-permalinks

  # Security checks - gitleaks only (fast enough for pre-commit)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # Documentation formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(Cargo\.lock|.*\.rs)$

  # File content checks
  - repo: https://github.com/sirosen/texthooks
    rev: 0.6.2
    hooks:
      - id: fix-smartquotes
      - id: fix-ligatures
      - id: forbid-bidi-controls

  # License and formatting checks
  - repo: https://github.com/Lucas-C/pre-commit-hooks-nodejs
    rev: v1.1.2
    hooks:
      - id: forbid-tabs
        exclude: (Makefile|\.gitmodules$|justfile)$

  # Typos check
  - repo: https://github.com/crate-ci/typos
    rev: v1.29.4
    hooks:
      - id: typos

  # Conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.2.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

# ============================================
# Stage: commit-msg (Run after commit message is created)
# ============================================
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.20.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional@19.7.1'

# ============================================
# Stage: pre-push (Run before pushing to remote)
# Target: Comprehensive checks, can be slow
# ============================================
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt (check)
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]

      - id: cargo-clippy
        name: cargo clippy (strict)
        entry: cargo clippy --all-targets --all-features -- -D warnings -D clippy::all
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]

      - id: cargo-test
        name: cargo test
        entry: cargo test --all --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [push]

      - id: cargo-audit
        name: cargo audit (security)
        entry: cargo audit
        language: system
        pass_filenames: false
        stages: [push]

# ============================================
# Configuration
# ============================================
default_stages: [commit]
fail_fast: false
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
