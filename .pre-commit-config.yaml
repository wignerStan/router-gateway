# Pre-commit Configuration
# Production-ready automated checks for Bun/TypeScript projects
# Unified management of all git hooks: pre-commit, commit-msg, and pre-push

# ============================================
# Stage: pre-commit (Run before creating a commit)
# ============================================
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-executables-have-shebangs
      - id: check-vcs-permalinks
      - id: check-ast
      - id: check-builtin-literals
      - id: debug-statements
      - id: fix-byte-order-marker
      - id: fix-encoding-pragma

  # Security checks - gitleaks only (detect-secrets removed to avoid redundancy)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  # TypeScript/Bun specific checks (pre-commit stage)
  - repo: local
    hooks:
      - id: bun-lint
        name: bun lint
        entry: bun run lint
        language: system
        files: \.(ts|js|cjs|mjs)$
        pass_filenames: false

      - id: bun-type-check
        name: bun type check
        entry: bun run type-check
        language: system
        files: \.(ts|js|cjs|mjs)$
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: bun x prettier --write
        language: system
        files: \.(ts|js|cjs|mjs|json|md|yml|yaml)$
        pass_filenames: true

  # Documentation formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json, toml]
        exclude: ^(package-lock.json|yarn.lock|pnpm-lock.yaml|bun.lockb)$

  # File content checks
  - repo: https://github.com/sirosen/texthooks
    rev: 0.4.0
    hooks:
      - id: fix-smartquotes
      - id: fix-ligatures
      - id: forbid-bidi-controls

  # License and formatting checks
  - repo: https://github.com/Lucas-C/pre-commit-hooks-nodejs
    rev: v1.1.2
    hooks:
      - id: forbid-tabs
        exclude: (Makefile|\.gitmodules$)

  # Typos check
  - repo: https://github.com/crate-ci/typos
    rev: v1.20.0
    hooks:
      - id: typos

# ============================================
# Stage: commit-msg (Run after commit message is created)
# ============================================
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.18.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - '@commitlint/config-conventional@18.6.0'

# ============================================
# Stage: pre-push (Run before pushing to remote)
# ============================================
  - repo: local
    hooks:
      - id: bun-test
        name: bun test (pre-push)
        entry: bun test
        language: system
        files: \.(ts|js|cjs|mjs)$
        pass_filenames: false
        stages: [push]

      - id: bun-build
        name: bun build (pre-push)
        entry: bun run build
        language: system
        files: \.(ts|js|cjs|mjs)$
        pass_filenames: false
        stages: [push]

      - id: bun-test-coverage
        name: bun test coverage (pre-push)
        entry: bun test --coverage
        language: system
        files: \.(ts|js|cjs|mjs)$
        pass_filenames: false
        stages: [push]

# ============================================
# Configuration
# ============================================
default_stages: [commit]
fail_fast: false
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ''
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: []
  submodules: false
