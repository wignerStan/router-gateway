# Pre-commit Configuration
# Production-ready automated checks for Rust projects
# Aligned with Agentic Native principles

# ============================================
# Stage: pre-commit (Run before creating a commit)
# Target: <5s execution time
# ============================================
repos:
  # General file checks (fast)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-vcs-permalinks

  # Security checks - gitleaks only (fast enough for pre-commit)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Documentation formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(Cargo\.lock|.*\.rs)$

  # File content checks
  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
      - id: fix-ligatures
      - id: forbid-bidi-controls

  # Typos check
  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos

  # Conventional commits
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================
  # Stage: commit-msg (Run after commit message is created)
  # ============================================
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/config-conventional@19.7.1"

  # ============================================
  # Stage: pre-push (Run before pushing to remote)
  # Target: Comprehensive checks, can be slow
  # ============================================
  - repo: local
    hooks:
      # Auto-formatting the code before commit
      - id: cargo-fmt
        name: cargo fmt (auto-format)
        entry: cargo fmt --all
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-commit]

      - id: cargo-clippy
        name: cargo clippy (strict)
        entry: cargo clippy --all-targets --all-features -- -D warnings -A missing_docs
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-test
        name: cargo test
        entry: cargo test --all --all-features
        language: system
        types: [rust]
        pass_filenames: false
        stages: [pre-push]

      - id: cargo-audit
        name: cargo audit (security)
        entry: cargo audit --ignore RUSTSEC-2024-0370
        language: system
        pass_filenames: false
        stages: [pre-push]

      # --- bd (beads) integration ---
      # pre-commit runs bd chained hooks (issue linking, checks)
      - id: bd-pre-commit
        name: bd (beads) pre-commit
        entry: bd hooks run pre-commit
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
        verbose: true

      # pre-push runs bd chained hooks before push
      - id: bd-pre-push
        name: bd (beads) pre-push
        entry: bd hooks run pre-push
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
        verbose: true

      # prepare-commit-msg adds agent identity trailers for forensics
      - id: bd-prepare-commit-msg
        name: bd (beads) agent trailer
        entry: bd hooks run prepare-commit-msg
        language: system
        pass_filenames: false
        stages: [prepare-commit-msg]
        always_run: true
        verbose: true

      # post-merge re-syncs bd state after merge/pull
      - id: bd-post-merge
        name: bd (beads) post-merge sync
        entry: bd hooks run post-merge
        language: system
        pass_filenames: false
        stages: [post-merge]
        always_run: true
        verbose: true

      # post-checkout re-syncs bd state after branch checkout
      - id: bd-post-checkout
        name: bd (beads) post-checkout sync
        entry: bd hooks run post-checkout
        language: system
        pass_filenames: false
        stages: [post-checkout]
        always_run: true
        verbose: true

# ============================================
# Configuration
# ============================================
exclude: >-
  (?x)^(
    target/|
    node_modules/|
    \.git/|
    \.agents/|
    _bmad.*/.*|
    .*\.lock
  )$

default_stages: [pre-commit]
fail_fast: false
ci:
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from pre-commit.com hooks

    for more information, see https://pre-commit.ci
  autofix_prs: true
  autoupdate_branch: ""
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: weekly
  skip: []
  submodules: false
