coverage:
  status:
    project:
      default:
        target: 90%
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: "header, diff, files"
  behavior: once

ignore:
  - "src/main.rs"
  - "src/bin/cli.rs"
  - "tests/**"
