# Clippy Configuration
msrv = "1.83"

# Warn on manual map and and_then
cognitive-complexity-threshold = 15

# Enum sizes
enum-variant-size-threshold = 256
enum-variant-name-threshold = 3

# Allow larger types in specific cases if needed, but keep a strict threshold
type-complexity-threshold = 250

# Ignore test directories for some rules
# allow-unwrap-in-tests = true # Not supported directly in clippy.toml, handled via lints
