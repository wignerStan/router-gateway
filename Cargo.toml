[workspace]
resolver = "2"
members = [
    "apps/cli",
    "apps/gateway",
    "packages/smart-routing",
    "packages/model-registry",
    "packages/tracing"
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/proxy/gateway"
rust-version = "1.85"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.40", features = ["sync", "time", "rt", "rt-multi-thread", "macros"] }
tokio-util = "0.7"
async-trait = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# HTTP/Web
axum = "0.7"
tower = "0.5"
tower-http = "0.5"
http = "1.0"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

# CLI
clap = { version = "4.4", features = ["derive"] }

# Utilities
uuid = { version = "1.0", features = ["v4", "serde"] }

# Internal packages
smart-routing = { path = "packages/smart-routing", version = "0.1.0" }
model-registry = { path = "packages/model-registry", version = "0.1.0" }
llm-tracing = { path = "packages/tracing", version = "0.1.0" }

[workspace.lints.rust]
unsafe_code = "forbid"
missing_docs = "warn"

[workspace.lints.clippy]
# Base rules
all = { level = "warn", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "warn", priority = -1 }
perf = { level = "deny", priority = -1 }

# Specific rules based on references/Codex rules
collapsible_if = "deny"
uninlined_format_args = "deny"
redundant_closure_for_method_calls = "deny"
manual_range_contains = "deny"
unwrap_used = "deny"
expect_used = "allow"
panic = "deny"
todo = "warn"
clone_on_ref_ptr = "deny"

# Exceptions (allow) for common pedantic rules that are often too noisy
module_name_repetitions = "allow"
missing_errors_doc = "allow"
missing_panics_doc = "allow"
must_use_candidate = "allow"
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_precision_loss = "allow"
cast_sign_loss = "allow"
similar_names = "allow"
too_many_lines = "allow"
