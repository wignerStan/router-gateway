# Deny Configuration for Dependency Policy and Security
# Production-ready settings for cargo-deny

# Root options
[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

# Advisories check configuration
# More info: https://embarkstudios.github.io/cargo-deny/checks/advisories/cfg.html
[advisories]
db-path = "$CARGO_HOME/advisory-dbs"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Ignore specific advisories if needed
# RUSTSEC-2024-0370: proc-macro-error is unmaintained - transitive dep from tabled
ignore = ["RUSTSEC-2024-0370"]

# Licenses check configuration
# More info: https://embarkstudios.github.io/cargo-deny/checks/licenses/cfg.html
[licenses]
# Strict global allow list for standard production-grade licenses
# Unicode-3.0 is included as it is used by core unicode crates and is safe.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "MIT-0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
]
confidence-threshold = 0.8

# Least Privilege Exceptions: Allow specific components with non-standard licenses
# only when they are known, vetted, and necessary transitive dependencies.

[[licenses.exceptions]]
name = "colored"
allow = ["MPL-2.0"]

[licenses.private]
ignore = false
registries = []

# Bans check configuration
# More info: https://embarkstudios.github.io/cargo-deny/checks/bans/cfg.html
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = []
skip-tree = []

# Sources check configuration
# More info: https://embarkstudios.github.io/cargo-deny/checks/sources/cfg.html
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
