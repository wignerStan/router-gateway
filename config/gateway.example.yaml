# LLM Gateway Example Configuration
#
# Copy this file to gateway.yaml and customize for your environment.
# The gateway loads from: gateway.yaml, config/gateway.yaml, or GATEWAY_CONFIG env var.

server:
  host: 0.0.0.0
  port: 3000
  timeout_secs: 120
  # Authentication tokens (empty = auth disabled)
  # NOTE: These are NOT expanded from env vars. Use literal values.
  auth_tokens:
    - your-auth-token-here
  # Only enable behind a trusted reverse proxy
  trust_proxy_headers: false

credentials:
  - id: openai-primary
    provider: openai
    api_key: ${OPENAI_API_KEY}
    priority: 10

  - id: google-primary
    provider: google
    api_key: ${GOOGLE_API_KEY}
    priority: 8

  - id: google-secondary
    provider: google
    api_key: ${GOOGLE_API_KEY}
    priority: 5
    rate_limit: 30

routing:
  # Options: weighted, time_aware, quota_aware, adaptive, policy_aware
  strategy: weighted
  session_affinity: true
  min_healthy_credentials: 1
  fallback_depth: 2

providers:
  openai:
    enabled: true
  google:
    enabled: true
  # Custom provider example:
  # custom-llm:
  #   enabled: true
  #   base_url: ${CUSTOM_LLM_BASE_URL:-https://api.custom-llm.example.com}
  #   headers:
  #     X-API-Version: "2024-01"
