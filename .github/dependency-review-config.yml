# Dependency Review Configuration
# Production-grade least privilege policy

# Severity threshold for failing the check
fail_on_severity: "high"

# Strict global allow list for standard production-grade licenses
allow_licenses:
  - "MIT"
  - "Apache-2.0"
  - "BSD-2-Clause"
  - "BSD-3-Clause"
  - "ISC"
  - "Unicode-DFS-2016"

# Least Privilege Exceptions:
# Specifically allow certain packages that have non-standard but safe licenses.
# This prevents opening up the global allow list to these licenses for all dependencies.
allow_dependencies_licenses:
  - "pkg:cargo/colored"
  - "pkg:cargo/icu_collections"
  - "pkg:cargo/icu_locale_core"
  - "pkg:cargo/icu_normalizer"
  - "pkg:cargo/icu_normalizer_data"
  - "pkg:cargo/icu_properties"
  - "pkg:cargo/icu_properties_data"
  - "pkg:cargo/icu_provider"
  - "pkg:cargo/litemap"
  - "pkg:cargo/potential_utf"
  - "pkg:cargo/tinystr"
  - "pkg:cargo/writeable"
  - "pkg:cargo/yoke"
  - "pkg:cargo/yoke-derive"
  - "pkg:cargo/zerofrom"
  - "pkg:cargo/zerofrom-derive"
  - "pkg:cargo/zerotrie"
  - "pkg:cargo/zerovec"
  - "pkg:cargo/zerovec-derive"
