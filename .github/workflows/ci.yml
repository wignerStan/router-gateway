# Rust CI Pipeline - Production Grade
# Comprehensive quality gates for the gateway LLM routing project

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        type: string

# Cancel redundant runs on same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # TIER 1: FAST QUALITY GATES (< 2 min)
  # ===========================================

  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  lint:
    name: Clippy Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: Run clippy (strict)
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    name: MSRV Check (1.85)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust 1.85
        uses: dtolnay/rust-toolchain@1.85

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Verify MSRV compatibility
        run: cargo check --all --all-features

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: typecheck

      - name: Run type check
        run: cargo check --all --all-features

  # ===========================================
  # TIER 2: TESTS WITH COVERAGE
  # ===========================================

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, lint, msrv]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests
        run: cargo nextest run --all-features

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest
    needs: [fmt, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage

      - name: Install cargo-llvm-cov and cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,cargo-nextest

      - name: Generate coverage report
        run: |
          cargo llvm-cov nextest \
            --profile ci \
            --lcov --output-path lcov.info \
            --ignore-filename-regex "src/main\.rs|src/bin/cli\.rs"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: unittests
          name: gateway-coverage

      - name: Coverage threshold gate (90%)
        run: |
          cargo llvm-cov \
            --fail-under-lines 90 \
            --ignore-filename-regex "src/main\.rs|src/bin/cli\.rs"

  # ===========================================
  # TIER 4: BUILD ARTIFACTS
  # ===========================================

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [test, coverage]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: gateway-linux-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: gateway-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: gateway-windows-amd64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.os }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p artifacts
          cp target/${{ matrix.target }}/release/gateway artifacts/${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/gateway-cli artifacts/${{ matrix.artifact }}-cli

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir artifacts
          copy target\${{ matrix.target }}\release\gateway.exe artifacts\${{ matrix.artifact }}
          copy target\${{ matrix.target }}\release\gateway-cli.exe artifacts\${{ matrix.artifact }}-cli

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/*
          retention-days: 7

  # ===========================================
  # TIER 5: DOCUMENTATION
  # ===========================================

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: docs

      - name: Build documentation
        run: cargo doc --no-deps --all

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc
          retention-days: 7

  # ===========================================
  # PR CHECKS: CONFIG & LINT HYGIENE
  # ===========================================

  config-change-warning:
    name: Config Change Warning
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect configuration file changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          NUMBER="${{ github.event.pull_request.number }}"

          CONFIG_FILES=$(git diff --name-only "$BASE" "$HEAD" | grep -E '^(clippy\.toml|Cargo\.toml|rustfmt\.toml|justfile|lefthook\.yml|\.github/workflows/)' || true)

          if [ -n "$CONFIG_FILES" ]; then
            CHANGED=$(echo "$CONFIG_FILES" | sed 's/^/`/;s/$`/' | tr '\n' ', ' | sed 's/,$//')
            BODY="## ⚠️ Configuration files changed

          This PR modifies: ${CHANGED}

          Please verify these changes are intentional and do not weaken lint rules, change build targets, or alter CI behavior."
            echo "$BODY" | gh pr comment "$NUMBER" --body-file -
            echo "::warning::Configuration files changed: ${CONFIG_FILES//$'\n'/, }"
          else
            echo "No configuration files changed."
          fi

  workspace-lint-inheritance:
    name: Workspace Lint Inheritance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check all workspace members inherit workspace lints
        run: ./scripts/check-lint-inheritance.sh || echo "::warning::Some crates do not inherit workspace lints (see above)"
