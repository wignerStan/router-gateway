# Security Pipeline - Rust Focused
# Comprehensive security scanning for the gateway project

name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 6 AM UTC
  workflow_dispatch:

# Cancel redundant runs
concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================
  # SECRET SCANNING
  # ===========================================

  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trufflehog:
    name: Secret Scan (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --debug --only-verified

  # ===========================================
  # DEPENDENCY SECURITY
  # ===========================================

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: security-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --ignore RUSTSEC-2024-0370

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo deny (advisories)
        run: cargo deny check advisories

      - name: Run cargo deny (licenses)
        run: cargo deny check licenses

      - name: Run cargo deny (bans)
        run: cargo deny check bans

      - name: Run cargo deny (sources)
        run: cargo deny check sources

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          config-file: .github/dependency-review-config.yml
          # Production standard for security health
          warn-on-openssf-scorecard-level: 3

  # ===========================================
  # CODE SECURITY
  # ===========================================

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Build for CodeQL
        run: cargo build --release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # ===========================================
  # SECURITY SUMMARY
  # ===========================================

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [gitleaks, trufflehog, cargo-audit, trivy, osv-scanner, cargo-deny]
    if: always()
    steps:
      - name: Check security status
        run: |
          FAILED=""
          [[ "${{ needs.gitleaks.result }}" != "success" ]] && FAILED+="gitleaks "
          [[ "${{ needs.trufflehog.result }}" != "success" ]] && FAILED+="trufflehog "
          [[ "${{ needs.cargo-audit.result }}" != "success" ]] && FAILED+="cargo-audit "
          [[ "${{ needs.trivy.result }}" != "success" ]] && FAILED+="trivy "
          [[ "${{ needs.osv-scanner.result }}" != "success" ]] && FAILED+="osv-scanner "
          [[ "${{ needs.cargo-deny.result }}" != "success" ]] && FAILED+="cargo-deny "

          if [ -n "$FAILED" ]; then
            echo "::error::Security checks failed: $FAILED"
            exit 1
          fi

      - name: Summary
        run: |
          echo "## 🔒 Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scanner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks (Secrets) | ${{ needs.gitleaks.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TruffleHog (Secrets) | ${{ needs.trufflehog.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Audit (CVEs) | ${{ needs.cargo-audit.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy (FS/OS) | ${{ needs.trivy.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OSV-Scanner (Deps) | ${{ needs.osv-scanner.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Cargo Deny (Policy) | ${{ needs.cargo-deny.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================
  # DEEP SECURITY: Property Tests + Fuzz Targets
  # Runs on schedule (weekly) and on-demand only.
  # Not blocking PRs — these are depth-focused checks.
  # ===========================================

  security-deep:
    name: Deep Security (Property + Fuzz)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: security-deep

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run property-based security tests
        run: cargo nextest run -E 'test(proptests)'

      - name: Set up Rust nightly for fuzzing
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo +nightly install cargo-fuzz

      - name: Build fuzz targets
        run: cargo +nightly fuzz build

      - name: Run SSRF fuzzer (120s)
        run: cargo +nightly fuzz run ssrf_url_fuzz -- -max_total_time=120

      - name: Run config parse fuzzer (120s)
        run: cargo +nightly fuzz run config_parse_fuzz -- -max_total_time=120

      - name: Run token match fuzzer (120s)
        run: cargo +nightly fuzz run token_match_fuzz -- -max_total_time=120

      - name: Deep security summary
        if: always()
        run: |
          echo "## 🛡️ Deep Security Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Duration |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Property tests | ~30s |" >> $GITHUB_STEP_SUMMARY
          echo "| SSRF fuzzer | 120s |" >> $GITHUB_STEP_SUMMARY
          echo "| Config parse fuzzer | 120s |" >> $GITHUB_STEP_SUMMARY
          echo "| Token match fuzzer | 120s |" >> $GITHUB_STEP_SUMMARY
